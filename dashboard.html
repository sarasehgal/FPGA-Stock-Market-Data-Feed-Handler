<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPGA Stock Feed - Live Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0e0; font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; height:100vh; }

.grid { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto 1fr 1fr; gap:8px; padding:8px; height:100vh; }

/* Header */
.header { grid-column:1/3; display:flex; justify-content:space-between; align-items:center; background:#111128; border-radius:8px; padding:8px 20px; border:1px solid #333; }
.header h1 { font-size:18px; color:#00ff88; }
.header .status { font-size:13px; }
.header .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; animation:pulse 1.5s infinite; }
.dot.live { background:#00ff88; }
.dot.dead { background:#ff4444; animation:none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Panels */
.panel { background:#111128; border-radius:8px; border:1px solid #222; padding:12px; overflow:hidden; display:flex; flex-direction:column; }
.panel h2 { font-size:13px; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }

/* Price table */
.price-table { width:100%; border-collapse:collapse; font-size:13px; }
.price-table th { text-align:left; color:#666; font-weight:normal; padding:4px 8px; border-bottom:1px solid #222; }
.price-table td { padding:5px 8px; border-bottom:1px solid #1a1a2e; }
.price-table .sym { color:#4a90d9; font-weight:600; }
.price-table .price { font-family:'Courier New',monospace; }
.price-table .above { color:#00ff88; }
.price-table .below { color:#ccc; }
.price-table .bar-cell { width:40%; }
.bar-bg { background:#1a1a2e; border-radius:3px; height:14px; position:relative; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width .4s ease; }
.thresh-mark { position:absolute; top:0; bottom:0; width:2px; background:#ff4444; }

/* Trigger feed */
.feed { flex:1; overflow-y:auto; font-family:'Courier New',monospace; font-size:12px; }
.feed::-webkit-scrollbar { width:4px; }
.feed::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
.feed-item { padding:3px 0; border-bottom:1px solid #1a1a2e; animation:fadeIn .3s; display:flex; gap:8px; }
.feed-item .ts { color:#555; }
.feed-item .sym { color:#4a90d9; font-weight:bold; }
.feed-item .price { color:#00ff88; }
.feed-item .side { color:#ff6b6b; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }

/* Stats */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat-box { background:#1a1a2e; border-radius:6px; padding:10px; text-align:center; }
.stat-box .val { font-size:24px; font-weight:700; color:#00ff88; font-family:'Courier New',monospace; }
.stat-box .label { font-size:11px; color:#666; margin-top:2px; }

/* Chart area */
.chart-wrap { flex:1; position:relative; }
canvas { width:100%!important; height:100%!important; }
</style>
</head>
<body>
<div class="grid">
  <!-- Header -->
  <div class="header">
    <h1>FPGA Stock Feed Pipeline</h1>
    <div class="status">
      <span class="dot dead" id="dot"></span>
      <span id="connStatus">Connecting...</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Triggers: <strong id="trigCount">0</strong>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      Rate: <strong id="trigRate">0</strong>/s
    </div>
  </div>

  <!-- Price Table -->
  <div class="panel">
    <h2>Live Prices vs Thresholds</h2>
    <table class="price-table">
      <thead><tr><th>Symbol</th><th>Price</th><th>Threshold</th><th class="bar-cell">Level</th></tr></thead>
      <tbody id="priceBody"></tbody>
    </table>
  </div>

  <!-- Trigger Feed -->
  <div class="panel">
    <h2>Trigger Feed</h2>
    <div class="feed" id="feed"></div>
  </div>

  <!-- Stats -->
  <div class="panel">
    <h2>System Stats</h2>
    <div class="stat-grid">
      <div class="stat-box"><div class="val" id="statTotal">0</div><div class="label">Total Triggers</div></div>
      <div class="stat-box"><div class="val" id="statRate">0</div><div class="label">Triggers/sec</div></div>
      <div class="stat-box"><div class="val" id="statLatAvg">—</div><div class="label">Avg Latency</div></div>
      <div class="stat-box"><div class="val" id="statLatMin">—</div><div class="label">Min Latency</div></div>
      <div class="stat-box"><div class="val" id="statSymbols">0</div><div class="label">Symbols Seen</div></div>
    </div>
  </div>

  <!-- Price History Chart -->
  <div class="panel">
    <h2>Price History</h2>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
</div>

<script>
const SYMBOLS = {
  AAPL:{thresh:120000,color:'#4a90d9'},
  MSFT:{thresh:200000,color:'#e74c3c'},
  NVDA:{thresh:900000,color:'#2ecc71'},
  TSLA:{thresh:500000,color:'#f39c12'},
  AMZN:{thresh:180000,color:'#9b59b6'},
  GOOG:{thresh:170000,color:'#1abc9c'},
  META:{thresh:500000,color:'#e67e22'},
  NFLX:{thresh:650000,color:'#e84393'},
};

// State
let trigCount = 0;
let startTime = Date.now();
let lastPrices = {};
let priceHistory = {};  // sym -> [{t, price}]
let symbolsSeen = new Set();
let recentRate = [];    // timestamps for rate calc
let latencies = [];     // recent latency values (ns)

Object.keys(SYMBOLS).forEach(s => { priceHistory[s] = []; });

// WebSocket
let ws;
function connect() {
  ws = new WebSocket('ws://localhost:8765');
  ws.onopen = () => {
    document.getElementById('dot').className = 'dot live';
    document.getElementById('connStatus').textContent = 'Live';
  };
  ws.onclose = () => {
    document.getElementById('dot').className = 'dot dead';
    document.getElementById('connStatus').textContent = 'Disconnected';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    try { handleTrigger(JSON.parse(e.data)); } catch(err) {}
  };
}
connect();

function handleTrigger(msg) {
  const {sym, price, side, ts, lat_ns, lat_cycles} = msg;
  if (!sym || !price) return;

  trigCount++;
  symbolsSeen.add(sym);
  lastPrices[sym] = price;
  recentRate.push(Date.now());
  if (lat_ns > 0) { latencies.push(lat_ns); if (latencies.length > 500) latencies.shift(); }

  // Price history
  if (priceHistory[sym]) {
    priceHistory[sym].push({t: Date.now(), price});
    if (priceHistory[sym].length > 300) priceHistory[sym].shift();
  }

  // Feed
  const feed = document.getElementById('feed');
  const div = document.createElement('div');
  div.className = 'feed-item';
  const timeStr = new Date(ts).toLocaleTimeString();
  const sideStr = side === 'a' ? 'ASK' : 'BID';
  const latStr = lat_ns > 0 ? `${(lat_ns/1000).toFixed(1)}us` : '';
  div.innerHTML = `<span class="ts">${timeStr}</span><span class="sym">${sym}</span><span class="price">$${(price/10000).toFixed(2)}</span><span class="side">${sideStr}</span><span class="ts">${latStr}</span>`;
  feed.prepend(div);
  while (feed.children.length > 50) feed.lastChild.remove();
}

// Update UI every 500ms
setInterval(() => {
  // Rate calc (triggers in last 5s)
  const now = Date.now();
  recentRate = recentRate.filter(t => now - t < 5000);
  const rate = (recentRate.length / 5).toFixed(1);

  document.getElementById('trigCount').textContent = trigCount.toLocaleString();
  document.getElementById('trigRate').textContent = rate;
  document.getElementById('statTotal').textContent = trigCount.toLocaleString();
  document.getElementById('statRate').textContent = rate;
  if (latencies.length > 0) {
    const avg = latencies.reduce((a,b)=>a+b,0)/latencies.length;
    const min = Math.min(...latencies);
    document.getElementById('statLatAvg').textContent = avg < 1000 ? `${avg.toFixed(0)}ns` : `${(avg/1000).toFixed(1)}us`;
    document.getElementById('statLatMin').textContent = min < 1000 ? `${min}ns` : `${(min/1000).toFixed(1)}us`;
  }
  document.getElementById('statSymbols').textContent = symbolsSeen.size;

  // Price table
  const body = document.getElementById('priceBody');
  body.innerHTML = '';
  Object.entries(SYMBOLS).forEach(([sym, cfg]) => {
    const p = lastPrices[sym] || 0;
    const pct = Math.min(p / (cfg.thresh * 1.5) * 100, 100);
    const threshPct = Math.min(cfg.thresh / (cfg.thresh * 1.5) * 100, 100);
    const above = p >= cfg.thresh;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="sym">${sym}</td>
      <td class="price ${above?'above':'below'}">$${(p/10000).toFixed(2)}</td>
      <td class="price" style="color:#ff6b6b">$${(cfg.thresh/10000).toFixed(2)}</td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${above?'#00ff88':cfg.color}"></div><div class="thresh-mark" style="left:${threshPct}%"></div></div></td>`;
    body.appendChild(tr);
  });

  // Chart
  drawChart();
}, 500);

// Simple canvas chart
function drawChart() {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  ctx.fillStyle = '#111128';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const now = Date.now();
  const windowMs = 60000; // 60s window
  const pad = {l:50, r:10, t:10, b:25};
  const w = canvas.width - pad.l - pad.r;
  const h = canvas.height - pad.t - pad.b;

  // Find price range across all visible data
  let minP = Infinity, maxP = -Infinity;
  Object.entries(priceHistory).forEach(([sym, arr]) => {
    arr.forEach(d => {
      if (now - d.t < windowMs) {
        const dollars = d.price / 10000;
        if (dollars < minP) minP = dollars;
        if (dollars > maxP) maxP = dollars;
      }
    });
  });
  if (minP === Infinity) { minP = 0; maxP = 100; }
  const range = maxP - minP || 1;
  minP -= range * 0.05;
  maxP += range * 0.05;

  // Grid lines
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (h * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + w, y); ctx.stroke();
    ctx.fillStyle = '#555';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    const val = maxP - (maxP - minP) * i / 4;
    ctx.fillText('$' + val.toFixed(0), pad.l - 4, y + 4);
  }

  // Draw lines per symbol
  Object.entries(SYMBOLS).forEach(([sym, cfg]) => {
    const arr = priceHistory[sym];
    if (!arr || arr.length < 2) return;
    ctx.strokeStyle = cfg.color;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    let started = false;
    arr.forEach(d => {
      if (now - d.t > windowMs) return;
      const x = pad.l + ((d.t - (now - windowMs)) / windowMs) * w;
      const y = pad.t + h - ((d.price / 10000 - minP) / (maxP - minP)) * h;
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Legend
  let lx = pad.l + 5;
  ctx.font = '10px sans-serif';
  Object.entries(SYMBOLS).forEach(([sym, cfg]) => {
    if (!lastPrices[sym]) return;
    ctx.fillStyle = cfg.color;
    ctx.fillRect(lx, pad.t + 2, 10, 10);
    ctx.fillStyle = '#aaa';
    ctx.textAlign = 'left';
    ctx.fillText(sym, lx + 13, pad.t + 11);
    lx += 55;
  });
}
</script>
</body>
</html>
