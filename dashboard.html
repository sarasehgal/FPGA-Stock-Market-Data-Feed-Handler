<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPGA Stock Feed - Live Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0e0; font-family:'Segoe UI',sans-serif; height:100vh; display:flex; flex-direction:column; }

.header { display:flex; justify-content:space-between; align-items:center; background:#111128; padding:10px 20px; border-bottom:1px solid #333; flex-shrink:0; }
.header h1 { font-size:18px; color:#00ff88; }
.header .stats { font-size:13px; font-family:monospace; }
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.dot.live { background:#00ff88; animation:pulse 1.5s infinite; }
.dot.dead { background:#ff4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.main { display:flex; flex:1; min-height:0; }
.left { flex:1; display:flex; flex-direction:column; border-right:1px solid #222; }
.right { width:420px; display:flex; flex-direction:column; }

.section { padding:10px 14px; border-bottom:1px solid #1a1a2e; }
.section h2 { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }

/* Price table */
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; color:#555; font-weight:normal; padding:3px 6px; }
td { padding:4px 6px; border-bottom:1px solid #111; }
.sym { color:#4a90d9; font-weight:600; }
.above { color:#00ff88; }
.below { color:#888; }
.bar { background:#1a1a2e; height:10px; border-radius:3px; position:relative; }
.bar-fill { height:100%; border-radius:3px; transition:width .3s; }
.bar-mark { position:absolute; top:0; bottom:0; width:2px; background:#f44; }

/* Feed */
.feed { flex:1; overflow-y:auto; font-family:monospace; font-size:11px; padding:8px 14px; min-height:0; }
.feed div { padding:2px 0; border-bottom:1px solid #0d0d20; animation:fadeIn .2s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* Chart */
.chart-box { flex:1; min-height:0; padding:8px; }
canvas { width:100%; height:100%; display:block; }

/* Stat boxes */
.stat-row { display:flex; gap:6px; padding:8px 14px; flex-wrap:wrap; }
.sbox { background:#1a1a2e; border-radius:5px; padding:6px 10px; text-align:center; flex:1; min-width:80px; }
.sbox .v { font-size:18px; font-weight:700; color:#00ff88; font-family:monospace; }
.sbox .l { font-size:9px; color:#555; }

#debug { color:#ff0; font-size:10px; padding:2px 14px; background:#1a0a0a; display:none; }
</style>
</head>
<body>

<div class="header">
  <h1>FPGA Stock Feed Pipeline</h1>
  <div class="stats">
    <span class="dot dead" id="dot"></span>
    <span id="conn">Connecting...</span> |
    Triggers: <b id="hdrCount">0</b> |
    Rate: <b id="hdrRate">0</b>/s |
    Latency: <b id="hdrLat">--</b>
  </div>
</div>

<div id="debug"></div>

<div class="stat-row">
  <div class="sbox"><div class="v" id="sTotal">0</div><div class="l">Total</div></div>
  <div class="sbox"><div class="v" id="sRate">0</div><div class="l">Rate/s</div></div>
  <div class="sbox"><div class="v" id="sLatAvg">--</div><div class="l">Avg Lat</div></div>
  <div class="sbox"><div class="v" id="sLatMin">--</div><div class="l">Min Lat</div></div>
  <div class="sbox"><div class="v" id="sSyms">0</div><div class="l">Symbols</div></div>
  <div class="sbox"><div class="v" id="sThresh" style="color:#00ff88">0</div><div class="l">Threshold</div></div>
  <div class="sbox"><div class="v" id="sEMA" style="color:#f39c12">0</div><div class="l">EMA Cross</div></div>
  <div class="sbox"><div class="v" id="sSpread" style="color:#e74c3c">0</div><div class="l">Spread</div></div>
</div>

<div class="main">
  <div class="left">
    <div class="section">
      <h2>Live Prices vs Thresholds</h2>
      <table>
        <thead><tr><th>Symbol</th><th>Price</th><th>Threshold</th><th style="width:30%">Level</th></tr></thead>
        <tbody id="prices"></tbody>
      </table>
    </div>
    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>
  </div>
  <div class="right">
    <div class="section"><h2>Trigger Feed (live)</h2></div>
    <div class="feed" id="feed"></div>
  </div>
</div>

<script>
const SYM = {
  AAPL:{th:120000,c:'#4a90d9'}, MSFT:{th:200000,c:'#e74c3c'}, NVDA:{th:900000,c:'#2ecc71'},
  TSLA:{th:500000,c:'#f39c12'}, AMZN:{th:180000,c:'#9b59b6'}, GOOG:{th:170000,c:'#1abc9c'},
  META:{th:500000,c:'#e67e22'}, NFLX:{th:650000,c:'#e84393'}
};

let count=0, prices={}, hist={}, syms=new Set(), rates=[], lats=[], rcnt={THRESH:0,EMA:0,SPREAD:0};
Object.keys(SYM).forEach(s => hist[s]=[]);

function dbg(msg) {
  const d = document.getElementById('debug');
  d.style.display = 'block';
  d.textContent = msg;
}

// WebSocket
let ws;
function wsConnect() {
  try {
    ws = new WebSocket('ws://localhost:8765');
  } catch(e) { dbg('WS create error: '+e); return; }
  ws.onopen = () => {
    document.getElementById('dot').className = 'dot live';
    document.getElementById('conn').textContent = 'Live';
  };
  ws.onclose = () => {
    document.getElementById('dot').className = 'dot dead';
    document.getElementById('conn').textContent = 'Disconnected';
    setTimeout(wsConnect, 2000);
  };
  ws.onerror = (e) => { dbg('WS error'); ws.close(); };
  ws.onmessage = (e) => {
    try {
      onTrigger(JSON.parse(e.data));
    } catch(err) {
      dbg('JS error: ' + err.message + ' | data: ' + e.data.substring(0,100));
    }
  };
}
wsConnect();

function onTrigger(m) {
  if (!m.sym || !m.price) return;
  count++;
  syms.add(m.sym);
  prices[m.sym] = m.price;
  rates.push(Date.now());
  if (m.lat_ns > 0) { lats.push(m.lat_ns); if (lats.length>500) lats.shift(); }
  const r = m.reason || 'THRESH';
  if (rcnt[r] !== undefined) rcnt[r]++;

  hist[m.sym] && hist[m.sym].push({t:Date.now(), p:m.price});
  if (hist[m.sym] && hist[m.sym].length > 300) hist[m.sym].shift();

  // Add to feed
  const feed = document.getElementById('feed');
  const d = document.createElement('div');
  const t = new Date(m.ts).toLocaleTimeString();
  const lat = m.lat_ns > 0 ? (m.lat_ns/1000).toFixed(1)+'us' : '';
  const rc = {THRESH:'#0f8',EMA:'#f90',SPREAD:'#f44'};
  d.innerHTML = '<span style="color:#555">'+t+'</span> '+
    '<span style="color:#4a90d9;font-weight:bold">'+m.sym+'</span> '+
    '<span style="color:#0f8">$'+(m.price/10000).toFixed(2)+'</span> '+
    '<span style="color:'+(rc[r]||'#888')+'">'+r+'</span> '+
    '<span style="color:#888">'+m.side+'</span> '+
    '<span style="color:#555">'+lat+'</span>';
  feed.prepend(d);
  while (feed.children.length > 100) feed.lastChild.remove();
}

// UI refresh every 500ms
setInterval(() => {
  const now = Date.now();
  rates = rates.filter(t => now-t < 5000);
  const rate = (rates.length/5).toFixed(1);

  document.getElementById('hdrCount').textContent = count.toLocaleString();
  document.getElementById('hdrRate').textContent = rate;
  document.getElementById('sTotal').textContent = count.toLocaleString();
  document.getElementById('sRate').textContent = rate;
  document.getElementById('sSyms').textContent = syms.size;
  document.getElementById('sThresh').textContent = rcnt.THRESH;
  document.getElementById('sEMA').textContent = rcnt.EMA;
  document.getElementById('sSpread').textContent = rcnt.SPREAD;

  if (lats.length > 0) {
    const avg = lats.reduce((a,b)=>a+b,0)/lats.length;
    const mn = Math.min(...lats);
    const f = v => v<1000 ? v.toFixed(0)+'ns' : (v/1000).toFixed(1)+'us';
    document.getElementById('sLatAvg').textContent = f(avg);
    document.getElementById('sLatMin').textContent = f(mn);
    document.getElementById('hdrLat').textContent = f(avg);
  }

  // Price table
  const tb = document.getElementById('prices');
  tb.innerHTML = '';
  Object.entries(SYM).forEach(([s, cfg]) => {
    const p = prices[s] || 0;
    const pct = Math.min(p/(cfg.th*1.5)*100, 100);
    const thPct = Math.min(cfg.th/(cfg.th*1.5)*100, 100);
    const above = p >= cfg.th;
    const tr = document.createElement('tr');
    tr.innerHTML = '<td class="sym">'+s+'</td>'+
      '<td class="'+(above?'above':'below')+'" style="font-family:monospace">$'+(p/10000).toFixed(2)+'</td>'+
      '<td style="color:#f66;font-family:monospace;font-size:11px">$'+(cfg.th/10000).toFixed(0)+'</td>'+
      '<td><div class="bar"><div class="bar-fill" style="width:'+pct+'%;background:'+(above?'#0f8':cfg.c)+'"></div><div class="bar-mark" style="left:'+thPct+'%"></div></div></td>';
    tb.appendChild(tr);
  });

  drawChart();
}, 500);

// Price chart
function drawChart() {
  const c = document.getElementById('chart');
  const ctx = c.getContext('2d');
  const r = c.parentElement.getBoundingClientRect();
  c.width = r.width; c.height = r.height;
  ctx.fillStyle = '#0d0d20'; ctx.fillRect(0,0,c.width,c.height);

  const now = Date.now(), win = 60000;
  const pad = {l:50,r:10,t:15,b:20};
  const w = c.width-pad.l-pad.r, h = c.height-pad.t-pad.b;

  let mn=Infinity, mx=-Infinity;
  Object.values(hist).forEach(a => a.forEach(d => {
    if (now-d.t<win) { const v=d.p/10000; if(v<mn)mn=v; if(v>mx)mx=v; }
  }));
  if (mn===Infinity) { mn=0; mx=100; }
  const rng = mx-mn||1; mn-=rng*.05; mx+=rng*.05;

  // Grid
  ctx.strokeStyle='#1a1a2e'; ctx.lineWidth=1;
  for (let i=0;i<=4;i++) {
    const y=pad.t+h*i/4;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+w,y); ctx.stroke();
    ctx.fillStyle='#444'; ctx.font='10px monospace'; ctx.textAlign='right';
    ctx.fillText('$'+(mx-(mx-mn)*i/4).toFixed(0), pad.l-4, y+4);
  }

  // Lines
  Object.entries(SYM).forEach(([s,cfg]) => {
    const a = hist[s]; if (!a||a.length<2) return;
    ctx.strokeStyle=cfg.c; ctx.lineWidth=2; ctx.globalAlpha=.85;
    ctx.beginPath(); let started=false;
    a.forEach(d => {
      if (now-d.t>win) return;
      const x=pad.l+((d.t-(now-win))/win)*w;
      const y=pad.t+h-((d.p/10000-mn)/(mx-mn))*h;
      if (!started){ctx.moveTo(x,y);started=true;} else ctx.lineTo(x,y);
    });
    ctx.stroke(); ctx.globalAlpha=1;
  });

  // Legend
  let lx=pad.l+5;
  Object.entries(SYM).forEach(([s,cfg]) => {
    if (!prices[s]) return;
    ctx.fillStyle=cfg.c; ctx.fillRect(lx,pad.t+2,8,8);
    ctx.fillStyle='#aaa'; ctx.font='10px sans-serif'; ctx.textAlign='left';
    ctx.fillText(s,lx+11,pad.t+10); lx+=55;
  });
}
</script>
</body>
</html>
